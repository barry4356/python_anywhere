{{extend 'layout.html'}}

{{block header}}
<div class="jumbotron jumbotron-fluid background" style="background-color: #333; color:white; padding:30px;word-wrap:break-word;">
  <div class="container center">
    <h1 class="display-5">Army Book Creation Tool</h1>
  </div>
</div>
{{end}}
<div class="split-container">
  <div class="left">
    <h1>Unit Creation</h1>
    <div>Editor Version: V0.1&emsp;Based on OPR Version: V3.5</div>
    <form>
        <hr>
        <p class="lead">{{=T('Unit and Model Options')}}</p>
        <input type="text" name="unitname" placeholder="Unit Name"><br />
        <label>Quality:&nbsp;</label><input type="number" name="modelWidth" min="2" max="10" step="1" value="10"/>&emsp;
        <label>Defense:&nbsp;</label><input type="number" name="modelWidth" min="2" max="10" step="1" value="10"/>&emsp;
        <label>Number of Models:&nbsp;</label><input type="number" name="modelWidth" min="1" max="20" step="1" value="1"/><br />
        <label>Model Length:&nbsp;</label><input type="number" name="modelWidth" min="1" max="10" step="1" value="1"/>&emsp;
        <label>Model Width:&nbsp;</label><input type="number" name="modelWidth" min="1" max="10" step="1" value="1"/>&emsp;
        <label>Model Height:&nbsp;</label><input type="number" name="modelWidth" min="1" max="10" step="1" value="2"/><br />
        <label>Fast&nbsp;</label><input type="checkbox" name="Fast">&emsp;
        <label>Regen&nbsp;</label><input type="checkbox" name="Regen">&emsp;
        <br />
        <label>Tough:&nbsp;</label><input type="number" name="Tough" min="0" max="20" step="1" value="0"/>&emsp;
        <label>Caster:&nbsp;</label><input type="number" name="Caster" min="0" max="9" step="1" value="0"/>&emsp;
        <p class="lead">{{=T('Weaon Loadout:')}}</p>
        <input type="submit" value="Submit" />
    </form>
    <hr>
    <p class="lead">{{=T('Weapon Builder')}}</p>
    <form action="{{=URL()}}" method="post">
        <div id="items-container">
            <div class="item-row">
                <input type="text" name="name" placeholder="Item Name" required />
                <input type="number" name="price" placeholder="Price" required />
            </div>
        </div>
        <button type="button" onclick="addRow()">Add Another</button>
        <input type="submit" value="Submit" />
    </form>
  </div>
  <div class="right">
    <h1>Army Book</h1>
    Current contents of the Army Book
  </div>
</div>

<div id="target"></div>

<script>
jQuery(document).ready(function(){
    jQuery('#qual').change(function(){
        // Get value and send via Ajax to 'select_handler'
        var val = jQuery(this).val();
        ajax("{{=URL('default', 'select_handler')}}", ['qual'], 'target');
    });
});
</script>

<script>
jQuery(document).ready(function(){
    jQuery('#AddWeapon').change(function(){
        // Get value and send via Ajax to 'select_handler'
        var val = jQuery(this).val();
        ajax("{{=URL('default', 'add_weapon')}}", ['qual'], 'target');
    });
});
</script>

<script>
  function addRow() {
    var container = document.getElementById('items-container');
    var newRow = container.querySelector('.item-row').cloneNode(true);
    // Clear values
    newRow.querySelectorAll('input').forEach(i => i.value = '');
    container.appendChild(newRow);
  }
</script>
